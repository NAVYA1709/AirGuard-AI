<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>AirGuard AI | Real-Time AQI Prediction</title>

    <link rel="stylesheet" href="style.css">

    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1779/1779807.png">

</head>

<body>

    <div class="container">

        <h1>🌍 AirGuard AI</h1>

        <p>
            AI-Powered Air Quality Prediction using Live Environmental Data
        </p>

    <input
        id="city"
        type="text"
        placeholder="Enter City (e.g. Delhi)"
    >

        <br><br>
    <button id="locationBtn">
        📍 Use My Location
    </button>

    <br><br>

        <button id="predictBtn">

            Predict AQI

        </button>

        <br><br>

    <div class="result-card" id="resultCard">

        <h2 id="result"></h2>

        <div id="category" class="badge"></div>

        <p id="recommendation"></p>

    </div>

        <button id="toggleData">Show Live Data ▼</button>

        <div id="pollutants" class="pollutant-grid" style="display:none;"></div>

     <p class="footer">
        Powered by OpenWeather API • AI-Based AQI Prediction
    </p>

    </div>
    

    <script src="script.js"></script>

</body>

</html>
